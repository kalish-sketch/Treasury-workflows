<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasurer Workflows — The World Before Nilus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #1a1a2e; line-height: 1.5; }

  /* ─── Top Navigation ─── */
  .top-bar { background: #1a1a2e; color: #fff; padding: 16px 32px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 20px; font-weight: 700; }
  .top-bar .bar-actions { display: flex; gap: 10px; }
  .btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: #fbbf24; color: #1a1a2e; }
  .btn-primary:hover { background: #f59e0b; }
  .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-secondary:hover { background: rgba(255,255,255,0.25); }
  .btn-ghost { background: transparent; color: #fbbf24; border: 1px solid #fbbf24; }
  .btn-ghost:hover { background: rgba(251,191,36,0.1); }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }

  .main-content { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

  /* ─── Tab Navigation ─── */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #fff; padding: 4px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .tab { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #666; transition: all 0.15s; }
  .tab.active { background: #1a1a2e; color: #fff; }
  .tab:hover:not(.active) { background: #f0f4ff; color: #1a1a2e; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── Company Profile ─── */
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .profile-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .profile-card h3 { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: center; }
  .form-row label { font-size: 12px; font-weight: 600; color: #666; min-width: 140px; }
  .form-row input, .form-row select { flex: 1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }
  .tag-input-wrapper { flex: 1; display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; min-height: 34px; align-items: center; cursor: text; }
  .tag-input-wrapper:focus-within { border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }
  .tag-input-wrapper .tag-pill { display: inline-flex; align-items: center; gap: 4px; background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .tag-pill .remove-tag { cursor: pointer; font-size: 14px; line-height: 1; opacity: 0.6; }
  .tag-pill .remove-tag:hover { opacity: 1; }
  .tag-input-wrapper input { border: none; outline: none; font-size: 12px; min-width: 100px; flex: 1; padding: 2px 0; }

  /* ─── Workflow Tables ─── */
  .cadence-section { margin-bottom: 32px; }
  .cadence-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .cadence-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #fff; }
  .daily .cadence-badge { background: #e74c3c; }
  .weekly .cadence-badge { background: #e67e22; }
  .monthly .cadence-badge { background: #3498db; }
  .quarterly .cadence-badge { background: #8e44ad; }
  .annual .cadence-badge { background: #16a085; }
  .cadence-title { font-size: 18px; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 8px; }
  thead th { background: #1a1a2e; color: #fff; padding: 8px 10px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; white-space: nowrap; }
  tbody td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f5f7ff; }

  .workflow-name { font-weight: 600; color: #1a1a2e; font-size: 12px; }
  .time-est { font-size: 10px; color: #6b7280; font-style: italic; }

  tr.sub-row { background: #fafbfc; }
  tr.sub-row td { padding: 6px 10px 6px 24px; font-size: 11px; border-bottom: 1px solid #f0f0f0; }
  tr.sub-row:hover { background: #f0f4ff; }
  .sub-name { font-weight: 500; color: #374151; font-size: 11px; }

  .who-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 500; margin: 1px; }
  .who-analyst { background: #dbeafe; color: #1e40af; }
  .who-treasurer { background: #fef3c7; color: #92400e; }
  .who-ap { background: #d1fae5; color: #065f46; }
  .who-ar { background: #ede9fe; color: #5b21b6; }
  .who-controller { background: #fce7f3; color: #9d174d; }
  .who-fpa { background: #ffedd5; color: #9a3412; }
  .who-bank { background: #f3f4f6; color: #374151; }
  .who-it { background: #e0e7ff; color: #3730a3; }
  .who-legal { background: #fef9c3; color: #713f12; }
  .who-tax { background: #ecfccb; color: #3f6212; }
  .sys-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 500; margin: 1px; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .pain-text { color: #b91c1c; font-size: 11px; }

  /* ─── Toggle checkboxes ─── */
  .toggle-cell { text-align: center; vertical-align: middle !important; }
  .toggle-cb { width: 18px; height: 18px; cursor: pointer; accent-color: #1a1a2e; }
  .wish-cb { accent-color: #16a085; }

  /* ─── Editable metric cells ─── */
  .metric-cell { min-width: 70px; }
  .metric-cell input { width: 100%; border: 1px solid transparent; background: transparent; font-size: 12px; font-weight: 600; padding: 2px 4px; border-radius: 4px; font-family: inherit; }
  .metric-cell input:hover { border-color: #ddd; }
  .metric-cell input:focus { outline: none; border-color: #3498db; background: #fff; box-shadow: 0 0 0 2px rgba(52,152,219,0.15); }
  .metric-cell.hrs input { color: #1e40af; }
  .metric-cell.err input { color: #b91c1c; }
  .metric-cell.opt input { color: #047857; }

  .section-total { background: #f0f4ff; font-weight: 600; }
  .section-total td { border-top: 2px solid #1a1a2e; font-size: 12px; }

  /* ─── Add workflow row ─── */
  .add-row { cursor: pointer; }
  .add-row td { color: #3498db; font-size: 12px; font-weight: 500; padding: 8px 10px; }
  .add-row:hover td { background: #eff6ff; }

  /* ─── Modal ─── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .modal .form-row { margin-bottom: 12px; }
  .modal .form-row label { min-width: 120px; }
  .modal textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px; }
  .modal textarea:focus { outline: none; border-color: #3498db; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  /* ─── Summary / Recommendation Panel ─── */
  .summary-panel { background: #1a1a2e; color: #fff; border-radius: 10px; padding: 24px; margin-top: 32px; }
  .summary-panel h2 { font-size: 18px; margin-bottom: 16px; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .metric-box { background: rgba(255,255,255,0.08); padding: 14px; border-radius: 8px; text-align: center; }
  .metric-box .big { font-size: 28px; font-weight: 700; }
  .metric-box .label { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .metric-box.gold .big { color: #fbbf24; }
  .metric-box.red .big { color: #ef4444; }
  .metric-box.green .big { color: #10b981; }
  .metric-box.blue .big { color: #60a5fa; }

  .agent-recs { margin-top: 20px; }
  .agent-recs h3 { font-size: 14px; margin-bottom: 12px; color: #fbbf24; }
  .agent-card { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.06); padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #fbbf24; }
  .agent-card .agent-name { font-weight: 700; font-size: 14px; }
  .agent-card .agent-desc { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .agent-card .agent-impact { font-size: 12px; color: #10b981; font-weight: 600; margin-top: 4px; }

  .note { font-size: 12px; color: #666; margin-top: 8px; padding: 10px 14px; background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 4px; margin-bottom: 12px; }

  /* ─── Export panel ─── */
  .export-panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-top: 20px; }
  .export-panel h3 { font-size: 14px; margin-bottom: 12px; }

  @media (max-width: 1200px) {
    .main-content { padding: 16px; }
    .profile-grid { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    table { font-size: 11px; }
  }
</style>
</head>
<body>

<!-- ═══════ TOP BAR ═══════ -->
<div class="top-bar">
  <h1>Treasurer Workflows — The World Before Nilus</h1>
  <div class="bar-actions">
    <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
    <button class="btn btn-ghost" onclick="exportJSON()">Export JSON</button>
    <button class="btn btn-primary" onclick="switchTab('summary')">View Recommendations →</button>
  </div>
</div>

<div class="main-content">

<!-- ═══════ TABS ═══════ -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('profile')">Company Profile</button>
  <button class="tab" onclick="switchTab('daily')">Daily</button>
  <button class="tab" onclick="switchTab('weekly')">Weekly</button>
  <button class="tab" onclick="switchTab('monthly')">Monthly</button>
  <button class="tab" onclick="switchTab('quarterly')">Quarterly</button>
  <button class="tab" onclick="switchTab('annual')">Annual</button>
  <button class="tab" onclick="switchTab('summary')">Summary & Agents</button>
</div>

<!-- ═══════ COMPANY PROFILE TAB ═══════ -->
<div id="tab-profile" class="tab-panel active">
  <div class="note">Fill in your company details so we can calibrate the workflow metrics and agent recommendations to your specific environment.</div>
  <div class="profile-grid">
    <div class="profile-card">
      <h3>Company Details</h3>
      <div class="form-row"><label>Company Name</label><input type="text" id="p-company" placeholder="Acme Corp"></div>
      <div class="form-row"><label>Annual Revenue</label><input type="text" id="p-revenue" placeholder="$500M"></div>
      <div class="form-row"><label>Industry</label>
        <select id="p-industry"><option value="">Select…</option><option>Manufacturing</option><option>Technology</option><option>Healthcare</option><option>Consumer / Retail</option><option>Energy</option><option>Financial Services</option><option>Real Estate</option><option>Professional Services</option><option>Transportation / Logistics</option><option>Other</option></select>
      </div>
      <div class="form-row"><label># of Entities</label><input type="number" id="p-entities" placeholder="5"></div>
      <div class="form-row"><label># of Countries</label><input type="number" id="p-countries" placeholder="3"></div>
      <div class="form-row"><label>Currencies Dealt In</label>
        <div class="tag-input-wrapper" id="p-currencies-wrap"><input type="text" placeholder="Type & press Enter (e.g. USD, EUR)" onkeydown="addTag(event,'p-currencies-wrap')"></div>
      </div>
      <div class="form-row"><label>Treasury Team Size</label><input type="number" id="p-team-size" placeholder="3"></div>
    </div>

    <div class="profile-card">
      <h3>Banking & Systems</h3>
      <div class="form-row"><label># of Bank Relationships</label><input type="number" id="p-num-banks" placeholder="6"></div>
      <div class="form-row"><label>Bank Names</label>
        <div class="tag-input-wrapper" id="p-banks-wrap"><input type="text" placeholder="Type & press Enter (e.g. JPM, BofA)" onkeydown="addTag(event,'p-banks-wrap')"></div>
      </div>
      <div class="form-row"><label># of Bank Accounts</label><input type="number" id="p-num-accounts" placeholder="15"></div>
      <div class="form-row"><label>ERP System</label>
        <select id="p-erp"><option value="">Select…</option><option>SAP</option><option>Oracle</option><option>NetSuite</option><option>Microsoft Dynamics</option><option>Sage Intacct</option><option>Workday</option><option>QuickBooks</option><option>Other</option></select>
      </div>
      <div class="form-row"><label>TMS (if any)</label><input type="text" id="p-tms" placeholder="None"></div>
      <div class="form-row"><label>Other Systems</label>
        <div class="tag-input-wrapper" id="p-other-sys-wrap"><input type="text" placeholder="Type & press Enter (e.g. Bloomberg, Kyriba)" onkeydown="addTag(event,'p-other-sys-wrap')"></div>
      </div>
      <div class="form-row"><label>Payment Volume / Mo</label><input type="text" id="p-payment-vol" placeholder="$50M"></div>
      <div class="form-row"><label>Credit Facilities</label><input type="text" id="p-facilities" placeholder="$100M revolver"></div>
    </div>
  </div>
</div>

<!-- ═══════ WORKFLOW TABS (Daily through Annual) ═══════ -->
<!-- These are built dynamically by JavaScript below -->
<div id="tab-daily" class="tab-panel"></div>
<div id="tab-weekly" class="tab-panel"></div>
<div id="tab-monthly" class="tab-panel"></div>
<div id="tab-quarterly" class="tab-panel"></div>
<div id="tab-annual" class="tab-panel"></div>

<!-- ═══════ SUMMARY TAB ═══════ -->
<div id="tab-summary" class="tab-panel">
  <div id="summary-content"></div>
</div>

</div><!-- end main-content -->

<!-- ═══════ ADD WORKFLOW MODAL ═══════ -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h2 id="modal-title">Add Custom Workflow</h2>
    <div class="form-row"><label>Workflow Name</label><input type="text" id="m-name" placeholder="e.g. Cash Repatriation"></div>
    <div class="form-row"><label>Who</label><input type="text" id="m-who" placeholder="e.g. Treasurer, Tax"></div>
    <div class="form-row"><label>Systems</label><input type="text" id="m-systems" placeholder="e.g. Excel, ERP, Bank portals"></div>
    <div class="form-row"><label>How It Works</label><textarea id="m-how" placeholder="Describe the workflow steps…"></textarea></div>
    <div class="form-row"><label>Pain Points</label><textarea id="m-pain" placeholder="What's painful about this workflow?"></textarea></div>
    <div class="form-row"><label>Hrs/Mo</label><input type="text" id="m-hrs" placeholder="e.g. 5–10"></div>
    <div class="form-row"><label>Error Cost</label><input type="text" id="m-err" placeholder="e.g. $100K–500K"></div>
    <div class="form-row"><label>$ Optimization</label><input type="text" id="m-opt" placeholder="e.g. $50K–200K/yr"></div>
    <input type="hidden" id="m-cadence">
    <input type="hidden" id="m-parent-id">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWorkflow()">Add Workflow</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA MODEL — All workflows stored here
// ═══════════════════════════════════════════════════
const WORKFLOW_DATA = {
  daily: {
    label: "Daily", tagline: "Every Morning by 9 AM", color: "#e74c3c",
    workflows: [
      { id:"d1", name:"Cash Position Report", timeEst:"~45–90 min/day",
        who:'<span class="who-tag who-analyst">Treasury Analyst</span>',
        systems:'<span class="sys-tag">Bank portals (×5–10)</span> <span class="sys-tag">Excel</span> <span class="sys-tag">SWIFT / BAI files</span>',
        how:"Log into each bank portal separately. Download prior-day closing balances (BAI2/MT940 files). Copy into master Excel workbook with one tab per bank. Formulas roll up to consolidated position. Manually adjust for known items not yet reflected. Convert foreign balances at daily rates.",
        pain:"First hour of every day is data collection. Each bank has different portal, format, and posting time. Copy-paste errors are common. No intraday visibility.",
        hrs:"20–40", err:"$50K–100K/yr missed investment on idle cash", opt:"$100K–500K/yr from real-time sweep optimization",
        doToday:false, wishToDo:false,
        subs:[
          {id:"d1s1",name:"Bank Portal Login & Data Collection",how:"Log into 5–10 bank portals, download BAI2/MT940 files. Each has different login, MFA, file format.",pain:"10–15 min per bank × 5–10 banks = 50–150 min before analysis starts."},
          {id:"d1s2",name:"Multi-Currency Consolidation",how:"Convert foreign currency balances using daily FX rates from bank portals or manually sourced. Applied in Excel formulas.",pain:"Stale or wrong FX rates misstate the position. No automated rate feed."},
          {id:"d1s3",name:"In-Transit Item Adjustment",how:"Manually identify checks in transit, pending wires, ACH batches. Cross-reference against payment files. Adjust reported balances.",pain:"Relies on memory and email threads. Easily missed items = wrong available balance."},
          {id:"d1s4",name:"Exception / Anomaly Flagging",how:"Visually scan for unusual transactions. No rules engine — treasurer's experience is the only detection mechanism.",pain:"Fraud and errors caught by luck. A duplicate $500K payment can sit undetected for days."}
        ]
      },
      { id:"d2", name:"Short-Term Cash Forecast (1–5 day)", timeEst:"~30–60 min/day",
        who:'<span class="who-tag who-analyst">Treasury Analyst</span> <span class="who-tag who-ap">AP Team</span> <span class="who-tag who-ar">AR Team</span>',
        systems:'<span class="sys-tag">ERP</span> <span class="sys-tag">Excel</span> <span class="sys-tag">Email</span>',
        how:"Pull AP aging from ERP. Pull AR aging. Email AP and AR to confirm timing. Manually adjust Excel forecast. Layer in one-offs (tax, payroll, debt service).",
        pain:"Relies on other departments responding. AP/AR data in ERP is stale. Excel model breaks if someone changes a formula.",
        hrs:"15–25", err:"$200K–1M if position drives wrong borrowing decision", opt:"$50K–150K/yr from automated ERP integration",
        doToday:false, wishToDo:false,
        subs:[
          {id:"d2s1",name:"AP/AR Data Pull & Validation",how:"Export AP and AR aging from ERP. Cross-check against known payments.",pain:"ERP shows invoice due dates, not actual payment dates."},
          {id:"d2s2",name:"Departmental Confirmation (Email Chase)",how:"Email AP, AR teams to confirm timing. Wait for responses. Follow up if no reply by noon.",pain:"30–50% of forecast accuracy depends on people replying to emails."},
          {id:"d2s3",name:"One-Off / Non-Recurring Layering",how:"Manually add known events: quarterly tax, payroll, debt service, insurance premium. Maintained in a separate Excel tab.",pain:"Non-recurring items are the #1 source of forecast misses."}
        ]
      },
      { id:"d3", name:"Payment Approval & Release", timeEst:"~30–60 min/day",
        who:'<span class="who-tag who-treasurer">Treasurer</span> <span class="who-tag who-ap">AP Team</span>',
        systems:'<span class="sys-tag">ERP</span> <span class="sys-tag">Bank portals</span> <span class="sys-tag">Email</span>',
        how:"AP prepares payment batch. Sends notice to treasury. Treasurer reviews, approves in ERP. Logs into bank portal(s) and releases payments. For large payments, dual authorization.",
        pain:"Two-system approval: ERP + bank. No single view across banks. Dual auth means chasing a second signer. Fraud risk without anomaly detection.",
        hrs:"15–25", err:"$100K–5M fraud exposure without anomaly detection", opt:"$50K–200K/yr from payment timing optimization",
        doToday:false, wishToDo:false,
        subs:[
          {id:"d3s1",name:"Payment Batch Review & Validation",how:"Review each payment for correct vendor, amount tolerance, approval chain, duplicates. Check policy limits.",pain:"Manual review of 30–100+ payments/day. Duplicate detection is visual."},
          {id:"d3s2",name:"Dual Authorization & Release",how:"Email/call second signer (CFO). Wait for them to log into bank portal and co-approve.",pain:"Second signer availability delays payments by hours or days."},
          {id:"d3s3",name:"OFAC / Sanctions Screening",how:"For international payments: verify payee against OFAC SDN, EU sanctions lists.",pain:"A sanctions violation = $1M+ fines. Most mid-market companies rely solely on bank screening."}
        ]
      },
      { id:"d4", name:"Intercompany Funding", timeEst:"~20–40 min/day",
        who:'<span class="who-tag who-analyst">Treasury Analyst</span> <span class="who-tag who-treasurer">Treasurer</span>',
        systems:'<span class="sys-tag">Bank portals</span> <span class="sys-tag">Excel</span> <span class="sys-tag">ERP</span>',
        how:"Identify cash-rich vs. cash-short entities. Initiate intercompany transfers via bank portals. Log in spreadsheet. Accounting reconciles at month-end.",
        pain:"Manual tracking of IC balances. Time zone issues. FX impact on IC transfers missed until month-end. No automated netting.",
        hrs:"10–20", err:"$50K–200K in FX losses from uncoordinated transfers", opt:"$100K–500K/yr from automated IC netting",
        doToday:false, wishToDo:false, subs:[]
      },
      { id:"d5", name:"FX Spot Trades", timeEst:"~15–30 min per trade",
        who:'<span class="who-tag who-treasurer">Treasurer</span> <span class="who-tag who-bank">Bank</span>',
        systems:'<span class="sys-tag">Email</span> <span class="sys-tag">Phone</span> <span class="sys-tag">Bank FX portal</span>',
        how:"Identify FX need. Email/call 1–3 banks for spot quotes. Wait, compare manually. Accept best rate. Confirm trade details. Log in Excel.",
        pain:"No price transparency. Email-based execution means no audit trail. Banks know you can't compare, so spreads are wide.",
        hrs:"5–15", err:"$50K–300K/yr in excess FX spread", opt:"$100K–500K/yr from multi-bank competitive bidding",
        doToday:false, wishToDo:false,

// ═══════ STATE ═══════
let customWorkflows = {}; // keyed by cadence id

// ═══════ RENDER FUNCTIONS ═══════
function renderAllCadences() {
  Object.keys(WORKFLOW_DATA).forEach(cadence => renderCadence(cadence));
}

function renderCadence(cadenceKey) {
  const c = WORKFLOW_DATA[cadenceKey];
  const container = document.getElementById(`tab-${cadenceKey}`);
  const allWorkflows = [...c.workflows, ...(customWorkflows[cadenceKey]||[])];

  let html = `<div class="cadence-section ${cadenceKey}">
    <div class="cadence-header">
      <span class="cadence-badge">${c.label}</span>
      <span class="cadence-title">${c.tagline}</span>
    </div>
    <table>
      <colgroup>
        <col style="width:3%"><col style="width:3%">
        <col style="width:12%"><col style="width:8%"><col style="width:9%">
        <col style="width:22%"><col style="width:17%">
        <col style="width:6%"><col style="width:8%"><col style="width:8%">
      </colgroup>
      <thead>
        <tr>
          <th title="We do this today">✓ Do</th>
          <th title="We wish we could do this">★ Wish</th>
          <th>Workflow</th><th>Who</th><th>Systems</th>
          <th>How It Actually Works</th><th>Pain Points</th>
          <th>Hrs/Mo</th><th>Error Cost</th><th>$ Optimization</th>
        </tr>
      </thead>
      <tbody>`;

  allWorkflows.forEach(w => {
    html += renderWorkflowRow(w, cadenceKey);
    (w.subs||[]).forEach(s => { html += renderSubRow(s, w.id, cadenceKey); });
  });

  html += `<tr class="add-row" onclick="openAddModal('${cadenceKey}')">
    <td colspan="10">+ Add custom workflow…</td>
  </tr>
  </tbody></table></div>`;

  container.innerHTML = html;
}

function renderWorkflowRow(w, cadence) {
  return `<tr>
    <td class="toggle-cell"><input type="checkbox" class="toggle-cb" ${w.doToday?'checked':''} onchange="toggleDo('${cadence}','${w.id}',this.checked)" title="We do this today"></td>
    <td class="toggle-cell"><input type="checkbox" class="toggle-cb wish-cb" ${w.wishToDo?'checked':''} onchange="toggleWish('${cadence}','${w.id}',this.checked)" title="We wish we could do this"></td>
    <td><span class="workflow-name">${w.name}</span><br><span class="time-est">${w.timeEst||''}</span></td>
    <td>${w.who}</td>
    <td>${w.systems}</td>
    <td style="font-size:11px;">${w.how}</td>
    <td class="pain-text">${w.pain}</td>
    <td class="metric-cell hrs"><input type="text" value="${w.hrs}" onchange="updateMetric('${cadence}','${w.id}','hrs',this.value)"></td>
    <td class="metric-cell err"><input type="text" value="${w.err}" onchange="updateMetric('${cadence}','${w.id}','err',this.value)"></td>
    <td class="metric-cell opt"><input type="text" value="${w.opt}" onchange="updateMetric('${cadence}','${w.id}','opt',this.value)"></td>
  </tr>`;
}

function renderSubRow(s, parentId, cadence) {
  return `<tr class="sub-row">
    <td></td><td></td>
    <td><span class="sub-name">↳ ${s.name}</span></td>
    <td colspan="2"></td>
    <td style="font-size:11px;">${s.how}</td>
    <td class="pain-text">${s.pain}</td>
    <td></td><td></td><td></td>
  </tr>`;
}

// ═══════ TAB SWITCHING ═══════
function switchTab(tabId) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => {
    if(t.textContent.toLowerCase().includes(tabId) || (tabId==='summary' && t.textContent.includes('Summary')) || (tabId==='profile' && t.textContent.includes('Profile'))) t.classList.add('active');
  });
  if(tabId==='summary') renderSummary();
}

// ═══════ TOGGLE HANDLERS ═══════
function findWorkflow(cadence, id) {
  let w = WORKFLOW_DATA[cadence].workflows.find(x=>x.id===id);
  if(!w && customWorkflows[cadence]) w = customWorkflows[cadence].find(x=>x.id===id);
  return w;
}
function toggleDo(cadence,id,val){ const w=findWorkflow(cadence,id); if(w) w.doToday=val; }
function toggleWish(cadence,id,val){ const w=findWorkflow(cadence,id); if(w) w.wishToDo=val; }
function updateMetric(cadence,id,field,val){ const w=findWorkflow(cadence,id); if(w) w[field]=val; }

// ═══════ TAG INPUT ═══════
function addTag(event, wrapperId) {
  if(event.key!=='Enter') return;
  event.preventDefault();
  const input = event.target;
  const val = input.value.trim();
  if(!val) return;
  const wrap = document.getElementById(wrapperId);
  const pill = document.createElement('span');
  pill.className = 'tag-pill';
  pill.innerHTML = `${val} <span class="remove-tag" onclick="this.parentElement.remove()">×</span>`;
  wrap.insertBefore(pill, input);
  input.value = '';
}

// ═══════ ADD WORKFLOW MODAL ═══════
function openAddModal(cadence, parentId) {
  document.getElementById('m-cadence').value = cadence;
  document.getElementById('m-parent-id').value = parentId || '';
  document.getElementById('modal-title').textContent = parentId ? 'Add Sub-Workflow' : 'Add Custom Workflow';
  document.getElementById('modal-add').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-add').classList.remove('show');
  ['m-name','m-who','m-systems','m-how','m-pain','m-hrs','m-err','m-opt'].forEach(id => document.getElementById(id).value='');
}
function saveWorkflow() {
  const cadence = document.getElementById('m-cadence').value;
  const parentId = document.getElementById('m-parent-id').value;
  const name = document.getElementById('m-name').value.trim();
  if(!name) return alert('Please enter a workflow name');

  const newId = 'custom_' + Date.now();
  const who = document.getElementById('m-who').value.split(',').map(w => `<span class="who-tag who-treasurer">${w.trim()}</span>`).join(' ');
  const sys = document.getElementById('m-systems').value.split(',').map(s => `<span class="sys-tag">${s.trim()}</span>`).join(' ');

  if(parentId) {
    const parent = findWorkflow(cadence, parentId);
    if(parent) {
      if(!parent.subs) parent.subs = [];
      parent.subs.push({ id:newId, name, how:document.getElementById('m-how').value, pain:document.getElementById('m-pain').value });
    }
  } else {
    if(!customWorkflows[cadence]) customWorkflows[cadence] = [];
    customWorkflows[cadence].push({
      id: newId, name, timeEst:'Custom', who, systems:sys,
      how: document.getElementById('m-how').value,
      pain: document.getElementById('m-pain').value,
      hrs: document.getElementById('m-hrs').value || '—',
      err: document.getElementById('m-err').value || '—',
      opt: document.getElementById('m-opt').value || '—',
      doToday: false, wishToDo: false, subs: [], custom: true
    });
  }
  closeModal();
  renderCadence(cadence);
}

// ═══════ SUMMARY & RECOMMENDATIONS ═══════
function renderSummary() {
  let totalDo=0, totalWish=0, totalWorkflows=0;
  const doIds=[], wishIds=[];

  Object.keys(WORKFLOW_DATA).forEach(cadence => {
    const all = [...WORKFLOW_DATA[cadence].workflows, ...(customWorkflows[cadence]||[])];
    all.forEach(w => {
      totalWorkflows++;
      if(w.doToday){ totalDo++; doIds.push(w.id); }
      if(w.wishToDo){ totalWish++; wishIds.push(w.id); }
    });
  });

  const allSelected = [...new Set([...doIds, ...wishIds])];
  const relevantAgents = AGENT_MAP.filter(a => a.workflows.some(wid => allSelected.includes(wid)));

  // Get company info
  const company = document.getElementById('p-company')?.value || 'Your Company';
  const revenue = document.getElementById('p-revenue')?.value || 'Not specified';

  let html = `<div class="summary-panel">
    <h2>Assessment Summary — ${company}</h2>
    <div class="metrics-grid">
      <div class="metric-box gold"><div class="big">${totalDo}</div><div class="label">Workflows Done Today</div></div>
      <div class="metric-box green"><div class="big">${totalWish}</div><div class="label">Workflows Wished For</div></div>
      <div class="metric-box blue"><div class="big">${totalWorkflows}</div><div class="label">Total Workflows Mapped</div></div>
      <div class="metric-box red"><div class="big">${relevantAgents.length}</div><div class="label">Recommended Agents</div></div>
    </div>`;

  if(allSelected.length === 0) {
    html += `<p style="color:#94a3b8;font-size:14px;text-align:center;padding:20px;">Go to each cadence tab and check "✓ Do" for workflows you perform today and "★ Wish" for workflows you wish you could do. Then come back here for personalized agent recommendations.</p>`;
  } else {
    html += `<div class="agent-recs"><h3>Recommended Nilus Agents</h3>`;
    relevantAgents.forEach(a => {
      const matchedCount = a.workflows.filter(wid => allSelected.includes(wid)).length;
      html += `<div class="agent-card">
        <div style="flex:1;">
          <div class="agent-name">${a.name}</div>
          <div class="agent-desc">${a.desc}</div>
          <div class="agent-impact">Impact: ${a.impact}</div>
          <div style="font-size:11px;color:#60a5fa;margin-top:2px;">${matchedCount} matching workflow${matchedCount>1?'s':''}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;

  // Export panel
  html += `<div class="export-panel">
    <h3>Export & Share</h3>
    <p style="font-size:13px;color:#666;margin-bottom:12px;">Export the full assessment (company profile + workflow selections + metrics) as JSON for implementation planning.</p>
    <button class="btn btn-primary" onclick="exportJSON()">Export Assessment JSON</button>
    <button class="btn btn-secondary" style="margin-left:8px;" onclick="printSummary()">Print Summary</button>
  </div>`;

  document.getElementById('summary-content').innerHTML = html;
}

// ═══════ EXPORT ═══════
function exportJSON() {
  const profile = {
    company: document.getElementById('p-company')?.value,
    revenue: document.getElementById('p-revenue')?.value,
    industry: document.getElementById('p-industry')?.value,
    entities: document.getElementById('p-entities')?.value,
    countries: document.getElementById('p-countries')?.value,
    currencies: getTagValues('p-currencies-wrap'),
    teamSize: document.getElementById('p-team-size')?.value,
    numBanks: document.getElementById('p-num-banks')?.value,
    banks: getTagValues('p-banks-wrap'),
    numAccounts: document.getElementById('p-num-accounts')?.value,
    erp: document.getElementById('p-erp')?.value,
    tms: document.getElementById('p-tms')?.value,
    otherSystems: getTagValues('p-other-sys-wrap'),
    paymentVolume: document.getElementById('p-payment-vol')?.value,
    facilities: document.getElementById('p-facilities')?.value
  };

  const workflows = {};
  Object.keys(WORKFLOW_DATA).forEach(cadence => {
    const all = [...WORKFLOW_DATA[cadence].workflows, ...(customWorkflows[cadence]||[])];
    workflows[cadence] = all.map(w => ({
      id:w.id, name:w.name, doToday:w.doToday, wishToDo:w.wishToDo,
      hrs:w.hrs, errCost:w.err, optimization:w.opt,
      custom: w.custom||false,
      subs: (w.subs||[]).map(s=>({id:s.id,name:s.name}))
    }));
  });

  const allSelected = [];
  Object.values(workflows).flat().forEach(w => { if(w.doToday||w.wishToDo) allSelected.push(w.id); });
  const agents = AGENT_MAP.filter(a => a.workflows.some(wid => allSelected.includes(wid))).map(a => ({name:a.name, desc:a.desc, impact:a.impact}));

  const data = { exportDate: new Date().toISOString(), profile, workflows, recommendedAgents: agents };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(profile.company||'company').replace(/\s+/g,'-').toLowerCase()}-treasury-assessment.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function getTagValues(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if(!wrap) return [];
  return Array.from(wrap.querySelectorAll('.tag-pill')).map(p => p.textContent.replace('×','').trim());
}

function printSummary() { window.print(); }

function resetAll() {
  if(!confirm('Reset all selections and custom values? This cannot be undone.')) return;
  Object.keys(WORKFLOW_DATA).forEach(cadence => {
    WORKFLOW_DATA[cadence].workflows.forEach(w => { w.doToday=false; w.wishToDo=false; });
  });
  customWorkflows = {};
  renderAllCadences();
}

// ═══════ INIT ═══════
renderAllCadences();
