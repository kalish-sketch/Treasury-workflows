<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="white">
  <!-- Nilus logo: upward chevron + stem + 3 symmetric wave pairs -->
  <g transform="translate(2, 1)">
    <!-- Upward chevron -->
    <path d="M18,1 L12.5,8.5 L15,8.5 L18,4 L21,8.5 L23.5,8.5 Z" />
    <!-- Vertical stem -->
    <rect x="16.8" y="9" width="2.4" height="5" rx="0.4"/>
    <!-- Wave tier 1 (narrow) -->
    <path d="M18,15 Q12,15 8,19.5" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
    <path d="M18,15 Q24,15 28,19.5" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
    <!-- Wave tier 2 (medium) -->
    <path d="M18,20.5 Q10,20.5 4,26.5" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
    <path d="M18,20.5 Q26,20.5 32,26.5" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
    <!-- Wave tier 3 (wide) -->
    <path d="M18,26 Q8,26 0,33.5" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
    <path d="M18,26 Q28,26 36,33.5" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
  </g>
  <!-- "nilus" wordmark -->
  <text x="50" y="34" font-family="'Nunito', 'Rubik', 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="500" letter-spacing="1.5">nilus</text>
</svg>
